name: Initialize
#
# Lives on `main`. Run once, manually, right after creating a repo from the
# dependency template. Connects main's ./release folder to the repo's own
# `release` branch via git-subrepo, then publishes main. The validation +
# subrepo clone + push lives in the hosted, unit-tested script
# scripts/actions/init-release-subrepo.sh; README population and self-deletion
# stay here in the action.

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  # Set this to your canonical scripts host (see note in suede-downstream-to-main.yml).
  SUEDE_SCRIPTS: https://raw.githubusercontent.com/pmalacho-mit/suede/refs/heads/main/scripts

jobs:
  install-release-subrepo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-subrepo
        shell: bash
        run: |
          git clone https://github.com/ingydotnet/git-subrepo ~/.git-subrepo
          echo "$HOME/.git-subrepo/lib" >> "$GITHUB_PATH"

      - name: Check git-subrepo installation
        shell: bash
        run: git subrepo --version

      - name: Configure git identity for commits
        shell: bash
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Connect ./release to the release branch
        shell: bash
        run: bash -c "$(curl -fsSL "$SUEDE_SCRIPTS/actions/init-release-subrepo.sh")"

      - name: Populate README with installation details
        shell: bash
        run: |
          bash -c "$(curl -fsSL "$SUEDE_SCRIPTS/populate/readme-after-init.sh")"

      - name: Commit and push updated README
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git add README.md
            git commit -m "chore(suede-init): update README after initialization"
            git push
          else
            echo "No changes to README.md to commit."
          fi

      - name: Delete initialize action (aka this file)
        shell: bash
        run: |
          set -euo pipefail
          FILE=".github/workflows/initialize.yml"

          if [[ -f "$FILE" ]]; then
            echo "Removing $FILE..."
            git rm -f "$FILE"

            # Commit and push if there are staged changes
            if [[ -n "$(git status --porcelain)" ]]; then
              git commit -m "chore(suede-init): remove initialization workflow"
              git push
            else
              echo "No changes to commit after removing $FILE."
            fi
          else
            echo "File $FILE not found; nothing to delete."
          fi
